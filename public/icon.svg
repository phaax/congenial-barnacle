<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" fill="#000000"/>
  <!-- DOS-style double border -->
  <rect x="16" y="16" width="480" height="480" fill="none" stroke="#55FF55" stroke-width="8"/>
  <rect x="28" y="28" width="456" height="456" fill="none" stroke="#55FF55" stroke-width="4"/>
  <!-- Sword blade -->
  <polygon points="256,80 270,220 256,240 242,220" fill="#55FF55"/>
  <!-- Sword crossguard -->
  <rect x="210" y="235" width="92" height="18" rx="4" fill="#55FF55"/>
  <!-- Sword grip -->
  <rect x="248" y="253" width="16" height="80" rx="3" fill="#AAAAAA"/>
  <!-- Sword pommel -->
  <ellipse cx="256" cy="345" rx="18" ry="12" fill="#55FF55"/>
  <!-- Corner decorations (DOS box-drawing style) -->
  <text x="22" y="56" font-family="monospace" font-size="28" fill="#55FF55">╔</text>
  <text x="462" y="56" font-family="monospace" font-size="28" fill="#55FF55">╗</text>
  <text x="22" y="502" font-family="monospace" font-size="28" fill="#55FF55">╚</text>
  <text x="462" y="502" font-family="monospace" font-size="28" fill="#55FF55">╝</text>
  <!-- Title text -->
  <text x="256" y="410" font-family="monospace" font-size="32" font-weight="bold" fill="#55FF55" text-anchor="middle">COTR</text>
  <text x="256" y="445" font-family="monospace" font-size="14" fill="#55FF55" text-anchor="middle">CHRONICLES</text>
  <text x="256" y="463" font-family="monospace" font-size="14" fill="#55FF55" text-anchor="middle">OF THE REALM</text>
</svg>
